version: 0.2

env:
  secrets-manager:
    SONAR_TOKEN: petclinic/sonar:SONAR_TOKEN
  parameter-store:
    SONAR_PROJECT_KEY: /petclinic/sonar/project-key
    SONAR_ORGANIZATION: /petclinic/sonar/organization

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - SONAR_VERSION=6.2.1.4610
      - curl -sSfL https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_VERSION}-linux-x64.zip -o sonar-scanner.zip
      - unzip -q sonar-scanner.zip
      - export PATH=$PATH:$(pwd)/sonar-scanner-${SONAR_VERSION}-linux-x64/bin

  build:
    commands:
      - mvn -B compile -DskipTests
      - sonar-scanner -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.organization=$SONAR_ORGANIZATION -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN -Dsonar.java.binaries=target/classes

  post_build:
    commands:
      - |
        STATUS=$(curl -s -u "$SONAR_TOKEN:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])")
      - echo Quality Gate status: $STATUS
      - |
        if [ "$STATUS" != "OK" ]; then
          echo Quality Gate FAILED
          exit 1
        fi

cache:
  paths:
    - /root/.m2/**/*
    - /root/.sonar/cache/**/*