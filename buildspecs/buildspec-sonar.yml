version: 0.2

env:
  secrets-manager:
    SONAR_TOKEN: "petclinic/sonar:SONAR_TOKEN"

  parameter-store:
    SONAR_PROJECT_KEY: "/petclinic/sonar/project-key"
    SONAR_ORGANIZATION: "/petclinic/sonar/organization"

phases:
  install:
    runtime-versions:
      java: corretto21

  build:
    # Optional: retry the BUILD phase only for transient network/server errors.
    # Supported only by CodeBuild EC2 compute images.
    on-failure: "RETRY-2-.*(502|503|504|Gateway Timeout|timed out).*"

    commands:
      - |
        set -euo pipefail

        mvn -B clean verify \
          -DskipTests \
          -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
          -Dsonar.organization="$SONAR_ORGANIZATION" \
          -Dsonar.qualitygate.wait=true \
          -Dsonar.qualitygate.timeout=600 \
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar

cache:
  paths:
    - "/root/.m2/**/*"
    - "/root/.sonar/cache/**/*"












