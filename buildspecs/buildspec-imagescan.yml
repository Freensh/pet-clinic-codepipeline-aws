build:
  commands:
    - echo Waiting for Amazon Inspector scan...
    - |
      for i in $(seq 1 20); do
        RESULT=$(aws ecr describe-image-scan-findings --no-paginate --repository-name $ECR_REPOSITORY --image-id imageTag=$IMAGE_TAG --query 'imageScanFindings.findingSeverityCounts' --output text 2>/dev/null)
        if [ -n "$RESULT" ] && [ "$RESULT" != "None" ]; then
          echo "Scan results available"
          break
        fi
        echo "Scan results not yet available, waiting..."
        sleep 30
      done
    - |
      CRITICAL=$(aws ecr describe-image-scan-findings --no-paginate --repository-name $ECR_REPOSITORY --image-id imageTag=$IMAGE_TAG --query 'imageScanFindings.findingSeverityCounts.CRITICAL' --output text)
    - "echo Critical findings: $CRITICAL"
    - |
      if [ "$CRITICAL" != "None" ] && [ "$CRITICAL" != "0" ]; then
        echo CRITICAL vulnerabilities found
        exit 1
      fi
    - echo Image scan passed.